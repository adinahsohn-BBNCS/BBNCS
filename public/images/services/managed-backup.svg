<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Managed backup and data protection</title>
  <desc id="desc">Illustration of a cloud with a security lock protecting business data</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f2f8"/>
      <stop offset="45%" stop-color="#d4e6f0"/>
      <stop offset="100%" stop-color="#c8deeb"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f0ff"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4d7dff"/>
      <stop offset="100%" stop-color="#1e4fd6"/>
    </linearGradient>
    <linearGradient id="serverTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3269ff"/>
      <stop offset="100%" stop-color="#1e4fd6"/>
    </linearGradient>
    <linearGradient id="dbTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f1f3d" flood-opacity="0.14"/>
    </filter>
    <filter id="card" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f1f3d" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- background color blobs -->
  <ellipse cx="180" cy="420" rx="160" ry="100" fill="#3269ff" opacity="0.07"/>
  <ellipse cx="1020" cy="380" rx="180" ry="110" fill="#14b8a6" opacity="0.08"/>
  <ellipse cx="600" cy="200" rx="220" ry="120" fill="#1e4fd6" opacity="0.06"/>

  <!-- subtle dots -->
  <g fill="#1e4fd6" opacity="0.1">
    <circle cx="120" cy="90" r="3"/><circle cx="200" cy="140" r="2"/><circle cx="280" cy="80" r="2.5"/>
    <circle cx="920" cy="120" r="2"/><circle cx="1000" cy="180" r="3"/><circle cx="1080" cy="90" r="2"/>
    <circle cx="150" cy="500" r="2"/><circle cx="1050" cy="520" r="2.5"/><circle cx="980" cy="440" r="2"/>
  </g>

  <!-- connection lines -->
  <g fill="none" stroke-width="2.5" opacity="0.35">
    <path d="M320 310 C420 260, 520 250, 600 280" stroke="#3269ff" stroke-dasharray="7 9"/>
    <path d="M880 310 C780 260, 680 250, 600 280" stroke="#14b8a6" stroke-dasharray="7 9"/>
    <path d="M600 380 L600 430" stroke="#1e4fd6"/>
  </g>

  <!-- left server — your data -->
  <g filter="url(#card)" transform="translate(210 238)">
    <rect x="0" y="0" width="140" height="118" rx="14" fill="#fff" stroke="#c7d8f5" stroke-width="2"/>
    <rect x="0" y="0" width="140" height="28" rx="14" fill="url(#serverTop)"/>
    <rect x="0" y="14" width="140" height="14" fill="url(#serverTop)"/>
    <circle cx="22" cy="14" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="36" cy="14" r="4" fill="#fff" opacity="0.55"/>
    <circle cx="50" cy="14" r="4" fill="#fff" opacity="0.55"/>
    <rect x="18" y="40" width="104" height="10" rx="5" fill="#dbeafe"/>
    <rect x="18" y="58" width="88" height="10" rx="5" fill="#eef3ff"/>
    <rect x="18" y="76" width="96" height="10" rx="5" fill="#dbeafe"/>
    <rect x="18" y="94" width="72" height="10" rx="5" fill="#eef3ff"/>
    <circle cx="118" cy="45" r="5" fill="#22c55e"/>
    <circle cx="118" cy="63" r="5" fill="#3269ff"/>
    <circle cx="118" cy="81" r="5" fill="#22c55e"/>
    <circle cx="118" cy="99" r="5" fill="#f59e0b"/>
  </g>

  <!-- right database — off-site backup -->
  <g filter="url(#card)" transform="translate(850 236)">
    <ellipse cx="70" cy="26" rx="70" ry="18" fill="url(#dbTop)"/>
    <rect x="0" y="26" width="140" height="76" fill="#fff"/>
    <ellipse cx="70" cy="102" rx="70" ry="18" fill="#ccfbf1"/>
    <rect x="0" y="26" width="140" height="76" fill="none" stroke="#99f6e4" stroke-width="2"/>
    <ellipse cx="70" cy="26" rx="70" ry="18" fill="none" stroke="#5eead4" stroke-width="2"/>
    <ellipse cx="70" cy="54" rx="70" ry="16" fill="none" stroke="#e8edf4" stroke-width="2"/>
    <ellipse cx="70" cy="80" rx="70" ry="16" fill="none" stroke="#e8edf4" stroke-width="2"/>
    <rect x="24" y="40" width="92" height="8" rx="4" fill="#99f6e4"/>
    <rect x="24" y="64" width="72" height="8" rx="4" fill="#ccfbf1"/>
    <rect x="24" y="88" width="84" height="8" rx="4" fill="#99f6e4"/>
    <circle cx="112" cy="44" r="5" fill="#14b8a6"/>
    <circle cx="112" cy="68" r="5" fill="#22c55e"/>
    <circle cx="112" cy="92" r="5" fill="#14b8a6"/>
  </g>

  <!-- central cloud + lock -->
  <g filter="url(#soft)" transform="translate(600 200)">
    <path fill="url(#cloud)" stroke="#b8ccf5" stroke-width="2" d="M-125 75c-46 0-84-34-84-76 0-38 29-69 66-75 11-44 50-76 98-76 40 0 74 23 90 57 8-2 17-4 26-4 46 0 84 38 84 84s-38 84-84 84H-125z"/>
    <g transform="translate(0 10)">
      <rect x="-36" y="12" width="72" height="60" rx="11" fill="url(#shield)"/>
      <path d="M-24 12v-14c0-13 11-24 24-24s24 11 24 24v14" fill="none" stroke="#0f1f3d" stroke-width="10" stroke-linecap="round"/>
      <circle cx="0" cy="44" r="10" fill="#fff"/>
      <rect x="-3.5" y="44" width="7" height="15" rx="3.5" fill="#fff"/>
      <!-- shine on lock -->
      <rect x="-28" y="20" width="8" height="22" rx="4" fill="#fff" opacity="0.18"/>
    </g>
  </g>

  <!-- upload -->
  <g transform="translate(600 432)" opacity="0.95">
    <circle cx="0" cy="0" r="36" fill="#fff" stroke="#c7d8f5" stroke-width="2" filter="url(#card)"/>
    <circle cx="0" cy="0" r="28" fill="#eef3ff"/>
    <path d="M0-14v22M-10 2l10-12 10 12" fill="none" stroke="#1e4fd6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- labels -->
  <g filter="url(#card)">
    <g transform="translate(218 368)">
      <rect x="0" y="0" width="124" height="38" rx="19" fill="#fff" stroke="#dbeafe" stroke-width="1.5"/>
      <text x="62" y="24" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f1f3d">Your data</text>
    </g>
    <g transform="translate(848 368)">
      <rect x="0" y="0" width="144" height="38" rx="19" fill="#fff" stroke="#99f6e4" stroke-width="1.5"/>
      <text x="72" y="24" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f766e">Off-site backup</text>
    </g>
    <g transform="translate(368 118)">
      <rect x="0" y="0" width="124" height="38" rx="19" fill="#fff" stroke="#c7d8f5" stroke-width="1.5"/>
      <circle cx="22" cy="19" r="6" fill="#1e4fd6"/>
      <path d="M19 19l2 2 4-5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="72" y="24" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e4fd6">Encrypted</text>
    </g>
    <g transform="translate(488 478)">
      <rect x="0" y="0" width="168" height="38" rx="19" fill="#fff" stroke="#c7d8f5" stroke-width="1.5"/>
      <circle cx="22" cy="19" r="6" fill="#3269ff"/>
      <circle cx="22" cy="19" r="2.5" fill="#fff"/>
      <text x="92" y="24" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e4fd6">24/7 monitoring</text>
    </g>
  </g>
</svg>
